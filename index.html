<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삿피크 원정대 수화물 배분</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">

import React, { useState, useEffect, useMemo } from 'react';
import Papa from 'papaparse';

// --- 설정 (이곳에 구글 시트 CSV URL을 넣으세요) ---
const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1uDshkv41LSU6sgCPCObH0KxefUk0VDc9/edit?usp=sharing&ouid=110984907149362559862&rtpof=true&sd=true';

const App = () => {
  const [items, setItems] = useState([]);
  const [activeMember, setActiveMember] = useState(null);
  const [searchQuery, setSearchQuery] = useState('');
  const [selectedCategory, setSelectedCategory] = useState('전체');
  const [isExceeded, setIsExceeded] = useState(null); // 용량 초과 경고용 멤버 ID

  // 1. 초기 데이터 로드 및 로컬 스토리지 연동
  useEffect(() => {
    const savedData = localStorage.getItem('expedition_luggage_v1');
    if (savedData) {
      setItems(JSON.parse(savedData));
    } else {
      fetchCSVData();
    }
  }, []);

  // 상태 변경 시 로컬 스토리지 자동 저장
  useEffect(() => {
    if (items.length > 0) {
      localStorage.setItem('expedition_luggage_v1', JSON.stringify(items));
    }
  }, [items]);

  const fetchCSVData = () => {
    Papa.parse(GOOGLE_SHEET_CSV_URL, {
      download: true,
      header: true,
      complete: (results) => {
        const formattedData = results.data.map((row, index) => ({
          id: `item-${index}`,
          name: row['품목명'] || '알 수 없는 품목',
          weight: parseFloat(row['무게(kg)'] || 0),
          volume: parseInt(row['부피(1-10)'] || 0),
          category: row['분류'] || '기타',
          owner: row['배정자'] || '미배정',
        }));
        setItems(formattedData);
      },
    });
  };

  // 2. 데이터 처리 (멤버 리스트 및 카테고리 추출)
  const members = useMemo(() => {
    const names = [...new Set(items.map(item => item.owner))].filter(name => name !== '미배정');
    return names;
  }, [items]);

  const categories = useMemo(() => {
    return ['전체', ...new Set(items.map(item => item.category))];
  }, [items]);

  // 3. 핸들러: 짐 이동 (Click & Move)
  const handleItemClick = (itemId) => {
    setItems(prevItems => prevItems.map(item => {
      if (item.id !== itemId) return item;

      // 배낭에서 빼기
      if (item.owner !== '미배정') {
        return { ...item, owner: '미배정' };
      }
      
      // 배낭에 넣기
      if (!activeMember) {
        alert('먼저 배분할 배낭(카드)을 클릭하여 활성화하세요!');
        return item;
      }

      // 용량 체크 (경고 애니메이션용)
      const targetMemberItems = prevItems.filter(i => i.owner === activeMember);
      const currentWeight = targetMemberItems.reduce((sum, i) => sum + i.weight, 0);
      const currentVolume = targetMemberItems.reduce((sum, i) => sum + i.volume, 0);

      if (currentWeight + item.weight > 23 || currentVolume + item.volume > 100) {
        setIsExceeded(activeMember);
        setTimeout(() => setIsExceeded(null), 500);
      }

      return { ...item, owner: activeMember };
    }));
  };

  const handleReset = () => {
    if (window.confirm('모든 배분 상태를 초기화하고 구글 시트에서 최신 데이터를 불러오시겠습니까?')) {
      localStorage.removeItem('expedition_luggage_v1');
      fetchCSVData();
      setActiveMember(null);
    }
  };

  // 4. 필터링 로직
  const filteredItems = items.filter(item => {
    const matchesSearch = item.name.toLowerCase().includes(searchQuery.toLowerCase());
    const matchesCategory = selectedCategory === '전체' || item.category === selectedCategory;
    return matchesSearch && matchesCategory;
  });

  return (
    <div className="min-h-screen bg-gray-100 pb-40">
      {/* 헤더: 검색 및 필터 */}
      <header className="sticky top-0 z-10 bg-white shadow-md p-4">
        <div className="flex justify-between items-center mb-4">
          <h1 className="text-xl font-bold text-gray-800">🏔️ 원정대 수화물 배분</h1>
          <button 
            onClick={handleReset}
            className="bg-red-500 text-white px-3 py-1 rounded-md text-sm font-medium hover:bg-red-600 transition"
          >
            초기화 & 동기화
          </button>
        </div>
        
        <input
          type="text"
          placeholder="장비 검색..."
          className="w-full p-2 border rounded-lg mb-3 focus:outline-blue-500"
          value={searchQuery}
          onChange={(e) => setSearchQuery(e.target.value)}
        />

        <div className="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
          {categories.map(cat => (
            <button
              key={cat}
              onClick={() => setSelectedCategory(cat)}
              className={`whitespace-nowrap px-4 py-1 rounded-full border text-sm transition ${
                selectedCategory === cat ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-600'
              }`}
            >
              {cat}
            </button>
          ))}
        </div>
      </header>

      <main className="p-4">
        {/* Top: 배낭 카드뷰 */}
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-8">
          {members.map(member => {
            const memberItems = items.filter(i => i.owner === member);
            const totalWeight = memberItems.reduce((sum, i) => sum + i.weight, 0);
            const totalVolume = memberItems.reduce((sum, i) => sum + i.volume, 0);
            const isSelected = activeMember === member;

            return (
              <div
                key={member}
                onClick={() => setActiveMember(member)}
                className={`bg-white rounded-xl p-4 shadow-sm border-4 transition-all ${
                  isSelected ? 'border-blue-500 scale-[1.02]' : 'border-transparent'
                } ${isExceeded === member ? 'animate-bounce border-red-500' : ''}`}
              >
                <h2 className="text-lg font-bold mb-3 flex justify-between">
                  {member} 🎒 <span className="text-sm font-normal text-gray-500">짐 {memberItems.length}개</span>
                </h2>
                
                {/* 무게 게이지 */}
                <div className="mb-2">
                  <div className="flex justify-between text-xs mb-1">
                    <span>무게 (kg)</span>
                    <span className={totalWeight > 23 ? 'text-red-500 font-bold' : ''}>{totalWeight.toFixed(1)} / 23</span>
                  </div>
                  <div className="w-full bg-gray-200 rounded-full h-2">
                    <div 
                      className={`h-2 rounded-full transition-all ${totalWeight > 23 ? 'bg-red-500' : 'bg-blue-500'}`}
                      style={{ width: `${Math.min((totalWeight / 23) * 100, 100)}%` }}
                    />
                  </div>
                </div>

                {/* 부피 게이지 */}
                <div className="mb-4">
                  <div className="flex justify-between text-xs mb-1">
                    <span>부피 (점수)</span>
                    <span className={totalVolume > 100 ? 'text-red-500 font-bold' : ''}>{totalVolume} / 100</span>
                  </div>
                  <div className="w-full bg-gray-200 rounded-full h-2">
                    <div 
                      className={`h-2 rounded-full transition-all ${totalVolume > 100 ? 'bg-red-500' : 'bg-orange-500'}`}
                      style={{ width: `${Math.min((totalVolume / 100) * 100, 100)}%` }}
                    />
                  </div>
                </div>

                {/* 배낭 내부 칩 */}
                <div className="flex flex-wrap gap-1">
                  {memberItems.map(item => (
                    <button
                      key={item.id}
                      onClick={(e) => { e.stopPropagation(); handleItemClick(item.id); }}
                      className={`text-[10px] px-2 py-1 rounded bg-blue-100 text-blue-700 border border-blue-200 ${
                        filteredItems.some(fi => fi.id === item.id) ? 'opacity-100 ring-2 ring-yellow-400' : 'opacity-30'
                      }`}
                    >
                      {item.name} ({item.weight})
                    </button>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      </main>

      {/* Bottom: 미배정 장비 풀 (Fixed) */}
      <footer className="fixed bottom-0 left-0 right-0 bg-white border-t-2 border-gray-200 p-4 max-h-48 overflow-y-auto">
        <h3 className="text-sm font-bold text-gray-500 mb-2 uppercase tracking-wider">미배정 장비 풀</h3>
        <div className="flex flex-wrap gap-2">
          {items.filter(i => i.owner === '미배정').map(item => {
            const isHighlighted = filteredItems.some(fi => fi.id === item.id);
            return (
              <button
                key={item.id}
                onClick={() => handleItemClick(item.id)}
                className={`px-3 py-1.5 rounded-full text-xs font-medium transition-all ${
                  isHighlighted 
                    ? 'bg-orange-500 text-white scale-105 shadow-md ring-2 ring-yellow-300' 
                    : 'bg-gray-200 text-gray-500 opacity-30'
                }`}
              >
                {item.name} <span className="text-[10px] opacity-75">{item.weight}kg</span>
              </button>
            );
          })}
        </div>
      </footer>
    </div>
  );
};

export default App;

</script>
</body>
</html>
