<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAT PEAK 2026 물류 관리 v25</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRMz1Mst7D5jGzoM6osU0pdF0c0jn0TC6WLf_k7dTpsca6lQV2e5mT_BCieoXAapA/pub?gid=1147527820&single=true&output=csv';

        const App = () => {
            const [items, setItems] = useState([]);
            const [bags, setBags] = useState([]);
            const [activeBagId, setActiveBagId] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('전체');
            const [isPoolOpen, setIsPoolOpen] = useState(true);
            const [globalBagWeight, setGlobalBagWeight] = useState(2.2);

            useEffect(() => {
                const savedItems = localStorage.getItem('satpeak_items_v25');
                const savedBags = localStorage.getItem('satpeak_bags_v25');
                const savedGlobalWeight = localStorage.getItem('satpeak_global_weight_v25');
                if (savedGlobalWeight) setGlobalBagWeight(parseFloat(savedGlobalWeight));
                if (savedItems && savedBags) {
                    setItems(JSON.parse(savedItems));
                    setBags(JSON.parse(savedBags));
                } else {
                    const initialBags = ['대장', '종민', '의준', '지호', '서영', '형욱', '상국'].map((name, i) => ({
                        id: `bag-${Date.now()}-${i}`,
                        owner: name, bagWeight: 2.2, personalWeight: 0.0, isExcluded: false
                    }));
                    setBags(initialBags);
                    fetchCSV();
                }
            }, []);

            useEffect(() => {
                if (items.length > 0 || bags.length > 0) {
                    localStorage.setItem('satpeak_items_v25', JSON.stringify(items));
                    localStorage.setItem('satpeak_bags_v25', JSON.stringify(bags));
                    localStorage.setItem('satpeak_global_weight_v25', globalBagWeight.toString());
                }
            }, [items, bags, globalBagWeight]);

            const applyGlobalBagWeight = (newWeight) => {
                const val = parseFloat(newWeight) || 0;
                setGlobalBagWeight(val);
                setBags(bags.map(b => ({ ...b, bagWeight: val })));
            };

            const parseWeight = (w) => {
                if (!w || w.toString().trim() === "") return 0;
                const num = parseFloat(w.toString().replace(/[^0-9.]/g, ''));
                return w.toString().includes('kg') ? num : num / 1000;
            };

            const fetchCSV = () => {
                Papa.parse(CSV_URL, {
                    download: true, header: false, skipEmptyLines: true,
                    complete: (results) => {
                        const rows = results.data;
                        const newItems = [];
                        let lastCat = ''; let lastName = '';
                        rows.forEach((row, idx) => {
                            if (row[2] === '품목' || row[1] === '구분' || !row[2]) return;
                            lastCat = row[1]?.trim() || lastCat;
                            lastName = row[2]?.trim() || lastName;
                            const qty = parseInt(row[3]) || 0;
                            const weight = parseWeight(row[6]);
                            for (let i = 0; i < qty; i++) {
                                newItems.push({ id: `item-${idx}-${i}`, originalName: lastName, name: qty > 1 ? `${lastName} (${i + 1})` : lastName, weight, category: lastCat, owner: '미배정' });
                            }
                        });
                        setItems(newItems);
                    }
                });
            };

            const updateBag = (id, field, val) => setBags(bags.map(b => b.id === id ? { ...b, [field]: val } : b));
            const removeBag = (id) => {
                if (confirm('삭제하시겠습니까?')) {
                    setItems(items.map(i => i.owner === id ? { ...i, owner: '미배정' } : i));
                    setBags(bags.filter(b => b.id !== id));
                }
            };
            const assignOne = (originalName) => {
                if (!activeBagId) return alert('가방을 먼저 선택하세요!');
                setItems(prev => {
                    const idx = prev.findIndex(i => i.originalName === originalName && i.owner === '미배정');
                    if (idx === -1) return prev;
                    const newItems = [...prev];
                    newItems[idx] = { ...newItems[idx], owner: activeBagId };
                    return newItems;
                });
            };
            const handleItemUnassign = (id) => setItems(items.map(i => i.id === id ? { ...i, owner: '미배정' } : i));

            // 스마트 번개 배분
            const autoSpread = () => {
                const validBags = bags.filter(b => !b.isExcluded);
                const unassigned = items.filter(i => i.owner === '미배정' && i.name.includes(searchQuery) && (selectedCategory === '전체' || i.category === selectedCategory));
                if (validBags.length === 0 || unassigned.length === 0) return alert('조건을 확인하세요.');
                let updatedItems = [...items];
                const groups = {};
                unassigned.forEach(i => { if (!groups[i.originalName]) groups[i.originalName] = []; groups[i.originalName].push(i); });
                Object.keys(groups).sort((a,b) => groups[b][0].weight - groups[a][0].weight).forEach(name => {
                    const bagWeights = validBags.map(b => {
                        const bItems = updatedItems.filter(i => i.owner === b.id);
                        const w = (parseFloat(b.bagWeight)||0) + (parseFloat(b.personalWeight)||0) + bItems.reduce((s,i)=>s+i.weight,0);
                        return { id: b.id, weight: w };
                    }).sort((a,b)=>a.weight - b.weight);
                    groups[name].forEach((item, idx) => {
                        const targetBagId = bagWeights[idx % bagWeights.length].id;
                        const tIdx = updatedItems.findIndex(ui => ui.id === item.id);
                        updatedItems[tIdx].owner = targetBagId;
                    });
                });
                setItems(updatedItems);
            };

            const spreadSpecificItem = (originalName) => {
                const validBags = bags.filter(b => !b.isExcluded);
                const unassigned = items.filter(i => i.originalName === originalName && i.owner === '미배정');
                if (validBags.length === 0 || unassigned.length === 0) return;
                let updatedItems = [...items];
                const bagWeights = validBags.map(b => {
                    const bItems = updatedItems.filter(i => i.owner === b.id);
                    const w = (parseFloat(b.bagWeight)||0) + (parseFloat(b.personalWeight)||0) + bItems.reduce((s,i)=>s+i.weight,0);
                    return { id: b.id, weight: w };
                }).sort((a,b)=>a.weight - b.weight);
                unassigned.forEach((item, idx) => {
                    updatedItems[updatedItems.findIndex(ui => ui.id === item.id)].owner = bagWeights[idx % bagWeights.length].id;
                });
                setItems(updatedItems);
            };

            // 👇 여기에 두 함수를 추가 👇

// 1. 카톡 공유 함수
const exportToKakao = () => {
    if (bags.length === 0) return alert('공유할 카고백이 없습니다.');
    let text = `🏔️ SAT PEAK 2026 카고백 패킹 현황 🏔️\n\n`;
    bags.forEach(bag => {
        const bagItems = items.filter(i => i.owner === bag.id);
        const gearWeight = bagItems.reduce((s, i) => s + (i.weight || 0), 0);
        const totalWeight = (parseFloat(bag.bagWeight) || 0) + (parseFloat(bag.personalWeight) || 0) + gearWeight;
        const grouped = {};
        bagItems.forEach(i => { if (!grouped[i.originalName]) grouped[i.originalName] = 0; grouped[i.originalName]++; });
        const itemList = Object.entries(grouped).map(([name, count]) => `${name}(${count})`).join(', ');
        text += `🎒 [${bag.owner || '이름 없음'}] - 총 ${totalWeight.toFixed(2)}kg\n  └ 장비: ${itemList || '비어있음'}\n\n`;
    });
    const unassignedCount = items.filter(i => i.owner === '미배정').length;
    if (unassignedCount > 0) text += `⚠️ 미배정 장비: ${unassignedCount}개 남음\n`;
    navigator.clipboard.writeText(text)
        .then(() => alert('카톡 공유용 텍스트가 복사되었습니다! 카톡창에 붙여넣기 하세요.'))
        .catch(err => alert('복사에 실패했습니다.'));
};

// 2. 이미지 저장 함수
const exportToImage = () => {
    const target = document.getElementById('export-container');
    if (!target) return alert('캡처 영역을 찾을 수 없습니다.');
    
    html2canvas(target, { 
        backgroundColor: '#f8fafc',
        scale: 2, 
        useCORS: true 
    }).then(canvas => {
        const link = document.createElement('a');
        const dateStr = new Date().toISOString().slice(0,10);
        link.download = `SAT_PEAK_카고백_현황_${dateStr}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    }).catch(err => {
        alert('이미지 저장에 실패했습니다.');
        console.error(err);
    });
};

// (이 아래에 기존 const groupedUnassigned = useMemo(...) 가 있어야 합니다)

            
            const groupedUnassigned = useMemo(() => {
                const filtered = items.filter(i => i.owner === '미배정' && i.name.includes(searchQuery) && (selectedCategory === '전체' || i.category === selectedCategory));
                const groups = {};
                filtered.forEach(i => { if (!groups[i.originalName]) groups[i.originalName] = []; groups[i.originalName].push(i); });
                return groups;
            }, [items, searchQuery, selectedCategory]);

            return (
                <>
                    <div className={`max-w-7xl mx-auto p-4 transition-all duration-500 ${isPoolOpen ? 'pb-[400px]' : 'pb-24'}`}>
                        <header className="sticky top-0 bg-white/95 backdrop-blur-md shadow-sm p-6 rounded-[2rem] mb-8 z-20 border border-slate-100">
                            <div className="flex flex-wrap justify-between items-center gap-4 mb-4">
                                <h1 className="text-2xl font-black italic text-blue-900 tracking-tighter">🏔️ SAT PEAK LOGISTICS <span className="text-slate-300 font-light text-sm italic">v25</span></h1>
                                <div className="flex items-center gap-3 bg-slate-50 p-2 rounded-2xl border border-slate-100">
                                    <span className="text-[11px] font-bold text-slate-500 ml-2">표준 가방:</span>
                                    <input type="number" step="0.1" value={globalBagWeight} onChange={(e) => applyGlobalBagWeight(e.target.value)} className="w-16 bg-white border border-slate-200 rounded-lg text-sm font-black text-center p-1 outline-none focus:ring-2 focus:ring-blue-500" />
                                    <span className="text-[11px] font-bold text-slate-400 mr-2">kg</span>
                                </div>
                                <div className="flex gap-2 ml-auto">
                                    <button onClick={exportToImage} className="bg-indigo-500 text-white text-xs font-black px-4 py-2 rounded-xl shadow-md hover:bg-indigo-600 active:scale-95 transition-all">📸 이미지 저장</button>
    <button onClick={exportToKakao} className="bg-green-400 text-green-950 text-xs font-black px-4 py-2 rounded-xl shadow-md hover:bg-green-500 active:scale-95 transition-all">💬 카톡 공유</button>
                                    
                                    <button onClick={autoSpread} className="bg-amber-400 text-white text-xs font-bold px-4 py-2 rounded-xl shadow-md hover:bg-amber-500 active:scale-95 transition-all">⚡ 전체 번개배분</button>
                                    <button onClick={() => { const newBag = { id: `bag-${Date.now()}`, owner: '새 카고백', bagWeight: globalBagWeight, personalWeight: 0, isExcluded: false }; setBags([...bags, newBag]); }} className="bg-blue-600 text-white text-xs font-bold px-4 py-2 rounded-xl shadow-md">+ 백 추가</button>
                                    <button onClick={() => { if(confirm('RESET?')) { localStorage.clear(); location.reload(); } }} className="text-[10px] font-bold text-red-400 border border-red-100 px-3 py-1 rounded-lg">RESET</button>
                                </div>
                            </div>

                            <div className="flex items-center gap-3 mb-4 p-3 bg-slate-50 rounded-2xl border border-slate-100 overflow-x-auto no-scrollbar">
                                <span className="text-[10px] font-bold text-slate-400 uppercase">⚡ 제외:</span>
                                {bags.map(b => (
                                    <button key={b.id} onClick={() => updateBag(b.id, 'isExcluded', !b.isExcluded)} className={`px-3 py-1.5 rounded-xl text-[11px] font-bold whitespace-nowrap transition-all shadow-sm ${b.isExcluded ? 'bg-red-500 text-white' : 'bg-white text-slate-500 border border-slate-200'}`}>{b.owner || '이름 없음'}</button>
                                ))}
                            </div>

                            <div className="flex flex-col md:flex-row gap-4">
                                <input type="text" placeholder="장비 검색..." className="flex-1 p-3 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                                <div className="flex gap-2 overflow-x-auto no-scrollbar py-1">
                                    {['전체', '등반구', '막영구', '취사구', '통신', '연료', '식량'].map(c => <button key={c} onClick={() => setSelectedCategory(c)} className={`px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap transition-all ${selectedCategory === c ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-slate-400 border'}`}>{c}</button>)}
                                </div>
                            </div>
                        </header>

                        <div id="export-container" className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                            {bags.map(bag => {
                                const bagItems = items.filter(i => i.owner === bag.id);
                                const groupedBagItems = {};
                                bagItems.forEach(i => { if (!groupedBagItems[i.originalName]) groupedBagItems[i.originalName] = { ids: [], weight: i.weight }; groupedBagItems[i.originalName].ids.push(i.id); });
                                const gearWeight = bagItems.reduce((s, i) => s + (i.weight || 0), 0);
                                const totalWeight = (parseFloat(bag.bagWeight) || 0) + (parseFloat(bag.personalWeight) || 0) + gearWeight;
                                const active = activeBagId === bag.id;
                                
                                // 📍 검색어 스포트라이트 로직
                                const hasMatch = searchQuery && bagItems.some(i => i.originalName.includes(searchQuery));
                                const isDimmed = searchQuery && !hasMatch;

                                return (
                                    <div key={bag.id} onClick={() => setActiveBagId(bag.id)} 
                                         className={`bg-white p-6 rounded-[2.5rem] border-4 transition-all duration-300 cursor-pointer relative animate-fadeIn
                                         ${active ? 'border-blue-600 shadow-[0_0_25px_rgba(37,99,235,0.2)] -translate-y-2' : 'border-transparent shadow-sm hover:border-slate-200'}
                                         ${hasMatch ? 'ring-8 ring-amber-400/30 border-amber-500 bg-amber-50/50 scale-[1.02] z-10' : ''}
                                         ${isDimmed ? 'opacity-20 grayscale' : 'opacity-100'}`}>
                                        
                                        {hasMatch && <div className="absolute -top-3 left-1/2 -translate-x-1/2 bg-amber-500 text-white text-[10px] font-black px-3 py-1 rounded-full shadow-lg z-20 animate-bounce">MATCH!</div>}
                                        {active && !hasMatch && <div className="absolute -top-3 left-1/2 -translate-x-1/2 bg-blue-600 text-white text-[10px] font-black px-3 py-1 rounded-full shadow-lg z-10">SELECTED</div>}

                                        <div className="flex justify-between items-start mb-4">
                                            <div className="flex-1" onClick={e => e.stopPropagation()}>
                                                <div className="group/name relative flex items-center gap-2 mb-2 p-1 -m-1 rounded-2xl transition-all border-2 border-transparent focus-within:border-blue-500 focus-within:bg-white focus-within:ring-4 focus-within:ring-blue-100">
                                                    <input id={`input-n-${bag.id}`} value={bag.owner} onChange={e => updateBag(bag.id, 'owner', e.target.value)} onKeyDown={e => e.key === 'Enter' && e.target.blur()} className="font-black text-xl bg-transparent border-none w-full text-slate-800 outline-none p-1" placeholder="이름" />
                                                    <button onClick={() => document.getElementById(`input-n-${bag.id}`).focus()} className="flex-shrink-0 w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 group-focus-within/name:hidden text-blue-400">✎</button>
                                                    <button onClick={() => document.getElementById(`input-n-${bag.id}`).blur()} className="hidden group-focus-within/name:flex w-8 h-8 items-center justify-center rounded-full bg-blue-600 text-white shadow-lg font-bold text-xs">✓</button>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <div className="bg-slate-50 px-2 py-1 rounded-xl border flex items-center focus-within:ring-2 focus-within:ring-blue-200">
                                                        <span className="text-[9px] font-black text-slate-400 mr-1 uppercase">Bag</span>
                                                        <input type="number" step="0.1" value={bag.bagWeight} onChange={e => updateBag(bag.id, 'bagWeight', e.target.value)} className="w-8 bg-transparent text-[10px] font-black border-none p-0 text-center outline-none" />
                                                    </div>
                                                    <div className="bg-blue-50 px-2 py-1 rounded-xl border flex items-center focus-within:ring-2 focus-within:ring-blue-200">
                                                        <span className="text-[9px] font-black text-blue-500 mr-1 uppercase">Pers</span>
                                                        <input type="number" step="0.1" value={bag.personalWeight} onChange={e => updateBag(bag.id, 'personalWeight', e.target.value)} className="w-8 bg-transparent text-[10px] font-black border-none p-0 text-center text-blue-800 outline-none" />
                                                    </div>
                                                </div>
                                            </div>
                                            <button onClick={() => removeBag(bag.id)} className="text-slate-200 hover:text-red-500">✕</button>
                                        </div>

                                        <div className="flex justify-between items-end mb-2 px-1">
                                            <p className={`text-3xl font-black ${totalWeight > 23 ? 'text-red-500' : 'text-slate-800'}`}>{totalWeight.toFixed(2)}<span className="text-sm ml-1">kg</span></p>
                                            <p className={`text-[10px] font-black px-2 py-1 rounded-lg ${totalWeight > 23 ? 'bg-red-50 text-red-500' : 'bg-blue-50 text-blue-500'}`}>{totalWeight > 23 ? `초과 ${(totalWeight-23).toFixed(2)}` : `여유 ${(23-totalWeight).toFixed(2)}`}</p>
                                        </div>

                                        <div className="h-2.5 bg-slate-100 rounded-full mb-4 overflow-hidden shadow-inner">
                                            <div className={`h-full transition-all duration-700 ${totalWeight > 23 ? 'bg-red-500' : 'bg-blue-600'}`} style={{width: `${Math.min((totalWeight/23)*100, 100)}%`}} />
                                        </div>

                                        <div className="flex flex-wrap gap-1.5 min-h-[60px] content-start pt-3 border-t border-slate-50">
                                            {Object.entries(groupedBagItems).map(([name, g]) => {
                                                const isM = searchQuery && name.includes(searchQuery);
                                                return (
                                                    <span key={name} onClick={(e) => { e.stopPropagation(); handleItemUnassign(g.ids[g.ids.length - 1]); }} 
                                                          className={`flex items-center gap-1.5 text-[10px] px-2.5 py-1.5 rounded-xl font-bold border transition-all shadow-sm
                                                          ${isM ? 'bg-amber-400 border-amber-500 text-amber-950 scale-110 z-10' : 'bg-white text-slate-600'}`}>
                                                        {name} <span className={`${isM ? 'bg-amber-600' : 'bg-blue-600'} text-white px-1.5 py-0.5 rounded-lg text-[9px]`}>{g.ids.length}</span>
                                                    </span>
                                                );
                                            })}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <footer className={`fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl shadow-[0_-20px_50px_rgba(0,0,0,0.1)] border-t transition-all duration-500 z-30 ${isPoolOpen ? 'h-[360px]' : 'h-16'}`}>
                        <div className="max-w-7xl mx-auto px-6 h-full flex flex-col">
                            <div className="flex justify-between items-center h-16 cursor-pointer" onClick={() => setIsPoolOpen(!isPoolOpen)}>
                                <div className="flex items-center gap-4">
                                    <span className="text-xs font-black text-slate-400 uppercase italic">Gear Pool</span>
                                    <span className="bg-amber-100 text-amber-600 px-3 py-1 rounded-full text-[10px] font-black">{Object.keys(groupedUnassigned).length}종 / {items.filter(i => i.owner === '미배정').length}개</span>
                                </div>
                                <button className="bg-slate-50 px-4 py-2 rounded-xl text-slate-500 font-bold text-xs">{isPoolOpen ? '▼ 숨기기' : '▲ 펼치기'}</button>
                            </div>
                            <div className={`flex-1 overflow-y-auto pb-10 no-scrollbar ${!isPoolOpen && 'hidden'}`}>
                                <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 xl:grid-cols-10 gap-2">
                                    {Object.entries(groupedUnassigned).map(([name, g]) => (
                                        <div key={name} className="flex flex-col bg-white border p-2 rounded-xl shadow-sm hover:border-blue-200 transition-all">
                                            <div className="flex justify-between items-start mb-1.5">
                                                <div className="min-w-0 pr-1">
                                                    <p className="text-[10px] font-bold truncate text-slate-700" title={name}>{name}</p>
                                                    <p className="text-[8px] font-medium text-slate-400">{g[0].weight.toFixed(2)}kg</p>
                                                </div>
                                                <span className="bg-slate-50 text-slate-600 text-[9px] px-1 py-0.5 rounded-md font-black border">{g.length}</span>
                                            </div>
                                            <div className="flex gap-1 mt-auto">
                                                <button onClick={() => spreadSpecificItem(name)} className="bg-blue-500 text-white px-2 py-1 rounded-lg text-[10px] font-black shadow-sm">⚡</button>
                                                <button onClick={() => assignOne(name)} className="flex-1 bg-amber-400 text-white py-1 rounded-lg text-[10px] font-black shadow-sm">담기</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </footer>
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
