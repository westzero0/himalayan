<script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRMz1Mst7D5jGzoM6osU0pdF0c0jn0TC6WLf_k7dTpsca6lQV2e5mT_BCieoXAapA/pub?gid=1147527820&single=true&output=csv';

        const App = () => {
            const [items, setItems] = useState([]);
            const [activeMember, setActiveMember] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('전체');
            
            // 📍 추가: 배분 제외 대상 설정 (기본: 대장님 제외 가능)
            const [excludedMembers, setExcludedMembers] = useState(['대장']);

            useEffect(() => {
                const saved = localStorage.getItem('satpeak_v7_pattern');
                if (saved) { setItems(JSON.parse(saved)); } 
                else { fetchCSV(); }
            }, []);

            useEffect(() => {
                if (items.length > 0) localStorage.setItem('satpeak_v7_pattern', JSON.stringify(items));
            }, [items]);

            const memberList = ['대장', '종민', '의준', '지호', '서영', '형욱', '상국'];

            // 📍 기능: 번개 배분 (현재 검색/필터링된 미배정 장비를 제외 대원 빼고 1개씩 배분)
            const autoSpread = () => {
                const targetMembers = memberList.filter(m => !excludedMembers.includes(m));
                if (targetMembers.length === 0) return alert('배분할 대원이 없습니다!');

                const unassignedTargetItems = items.filter(i => i.owner === '미배정' && (selectedCategory === '전체' || i.category === selectedCategory));
                
                if (unassignedTargetItems.length === 0) return alert('배분할 장비가 없습니다.');

                // 고유한 품목 이름별로 그룹화 (로프, 스크류 등)
                const itemGroups = [...new Set(unassignedTargetItems.map(i => i.originalName))];
                
                let updatedItems = [...items];
                itemGroups.forEach(name => {
                    const group = updatedItems.filter(i => i.originalName === name && i.owner === '미배정');
                    group.forEach((item, idx) => {
                        // 대원들에게 순차적으로 1개씩 배정
                        const member = targetMembers[idx % targetMembers.length];
                        const itemIdx = updatedItems.findIndex(ui => ui.id === item.id);
                        updatedItems[itemIdx].owner = member;
                    });
                });
                
                setItems(updatedItems);
            };

            const fetchCSV = () => {
                Papa.parse(CSV_URL, {
                    download: true,
                    header: false,
                    skipEmptyLines: true,
                    complete: (results) => {
                        const rows = results.data;
                        const newItems = [];
                        let lastCategory = '';
                        let lastItemName = '';

                        rows.forEach((row, idx) => {
                            if (row[2] === '품목' || row[1] === '구분' || !row[2]) return;

                            let category = row[1]?.trim() || lastCategory;
                            let name = row[2]?.trim() || lastItemName;
                            lastCategory = category;
                            lastItemName = name;

                            const qty = parseInt(row[3]) || 0;
                            const weight = parseFloat(row[6]?.toString().replace(/[^0-9.]/g, '')) || 0;
                            const isKg = row[6]?.toString().includes('kg');

                            for (let i = 0; i < qty; i++) {
                                newItems.push({
                                    id: `item-${idx}-${i}`,
                                    originalName: name, // 원본 이름 유지 (자동 배분용)
                                    name: qty > 1 ? `${name} (${i + 1})` : name,
                                    weight: isKg ? weight : weight / 1000,
                                    category: category,
                                    owner: '미배정'
                                });
                            }
                        });
                        setItems(newItems);
                    }
                });
            };

            const handleItemClick = (id) => {
                setItems(prev => prev.map(item => {
                    if (item.id !== id) return item;
                    if (item.owner !== '미배정') return { ...item, owner: '미배정' };
                    if (!activeMember) { alert('대원을 먼저 선택하세요!'); return item; }
                    return { ...item, owner: activeMember };
                }));
            };

            const categories = ['전체', '등반구', '막영구', '취사구', '통신', '연료', '식량'];
            const filtered = items.filter(i => i.name.includes(searchQuery) && (selectedCategory === '전체' || i.category === selectedCategory));

            return (
                <div className="max-w-6xl mx-auto p-4 pb-72 font-sans">
                    <header className="sticky top-0 bg-white/95 backdrop-blur-md shadow-md p-5 rounded-3xl mb-6 z-20 border border-slate-200">
                        <div className="flex justify-between items-center mb-4">
                            <h1 className="text-xl font-black text-blue-900 tracking-tighter">🏔️ SAT PEAK QUICK DIST</h1>
                            <div className="flex gap-2">
                                <button onClick={autoSpread} className="bg-blue-600 text-white text-xs font-bold px-4 py-2 rounded-xl shadow-lg hover:bg-blue-700 active:scale-95 transition-all">⚡ 번개 배분</button>
                                <button onClick={() => { if(confirm('리셋?')) { localStorage.removeItem('satpeak_v7_pattern'); fetchCSV(); } }} className="bg-red-50 text-red-500 text-[10px] font-bold px-2 py-1 rounded-lg">RESET</button>
                            </div>
                        </div>

                        {/* 📍 배분 옵션 설정 */}
                        <div className="flex items-center gap-3 mb-4 p-3 bg-slate-50 rounded-2xl border border-slate-100">
                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">제외 대원:</span>
                            <div className="flex flex-wrap gap-1">
                                {memberList.map(m => (
                                    <button key={m} onClick={() => setExcludedMembers(prev => prev.includes(m) ? prev.filter(em => em !== m) : [...prev, m])}
                                        className={`px-2 py-1 rounded-md text-[10px] font-bold transition-all ${excludedMembers.includes(m) ? 'bg-red-500 text-white' : 'bg-white text-slate-400 border border-slate-200'}`}>
                                        {m}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <input type="text" placeholder="검색..." className="w-full p-3 bg-white border border-slate-200 rounded-xl mb-4" onChange={e => setSearchQuery(e.target.value)} />
                        <div className="flex gap-2 overflow-x-auto no-scrollbar">
                            {categories.map(c => <button key={c} onClick={() => setSelectedCategory(c)} className={`px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-all ${selectedCategory === c ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-100 text-slate-400 hover:bg-slate-200'}`}>{c}</button>)}
                        </div>
                    </header>

                    {/* 대원 카드 및 푸터 생략 (이전과 동일하되 items.filter 적용) */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        {memberList.map(m => {
                            const mItems = items.filter(i => i.owner === m);
                            const tw = mItems.reduce((s, i) => s + i.weight, 0);
                            const active = activeMember === m;
                            return (
                                <div key={m} onClick={() => setActiveMember(m)} className={`bg-white p-5 rounded-2xl border-4 transition-all cursor-pointer relative ${active ? 'border-blue-500 shadow-xl -translate-y-1' : 'border-transparent shadow-sm'}`}>
                                    <div className="flex justify-between items-end mb-4">
                                        <span className={`text-lg font-black ${excludedMembers.includes(m) ? 'text-slate-300' : ''}`}>{m} {excludedMembers.includes(m) && '(제외)'}</span>
                                        <span className={`text-sm font-black ${tw > 23 ? 'text-red-500' : 'text-blue-600'}`}>{tw.toFixed(2)}kg</span>
                                    </div>
                                    <div className="h-1.5 bg-slate-100 rounded-full mb-3 overflow-hidden">
                                        <div className={`h-full transition-all duration-500 ${tw > 23 ? 'bg-red-500' : 'bg-blue-500'}`} style={{width: `${Math.min((tw/23)*100, 100)}%`}} />
                                    </div>
                            <div className="flex flex-wrap gap-1">
    {mItems.map(i => {
        const isMatch = searchQuery && i.name.includes(searchQuery); // 검색어와 일치하는가?
        return (
            <span key={i.id} 
                className={`text-[9px] px-1.5 py-0.5 rounded font-bold border transition-all 
                ${isMatch 
                    ? 'bg-yellow-400 text-black border-yellow-500 scale-110 z-10' // 검색 일치 시 노란색으로 강조
                    : searchQuery 
                        ? 'opacity-10 text-slate-200 border-transparent' // 검색 중인데 불일치하면 거의 안 보이게
                        : 'bg-blue-50 text-blue-700 border-blue-100' // 평상시
                }`}>
                {i.name}
            </span>
        );
    })}
</div>
                                </div>
                            );
                        })}
                    </div>

                    <footer className="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-slate-200 p-6 h-64 overflow-y-auto z-30 shadow-2xl">
                        <div className="max-w-6xl mx-auto">
                            <p className="text-[10px] font-black text-slate-400 mb-3 tracking-widest uppercase">
                                {selectedCategory} Gear Pool ({items.filter(i => i.owner === '미배정' && (selectedCategory === '전체' || i.category === selectedCategory)).length})
                            </p>
                            <div className="flex flex-wrap gap-2">
                                {items.filter(i => i.owner === '미배정' && (selectedCategory === '전체' || i.category === selectedCategory)).map(i => (
                                    <button key={i.id} onClick={() => handleItemClick(i.id)} className="px-3 py-1.5 rounded-xl text-[11px] font-bold border transition-all bg-amber-400 text-white border-amber-400 shadow-sm hover:scale-110 active:scale-95">
                                        {i.name} <span className="opacity-70 font-medium ml-1">{i.weight.toFixed(2)}kg</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
