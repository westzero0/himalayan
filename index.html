<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAT PEAK 2026 물류 관리 v32</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.2s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 font-sans">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRMz1Mst7D5jGzoM6osU0pdF0c0jn0TC6WLf_k7dTpsca6lQV2e5mT_BCieoXAapA/pub?gid=1147527820&single=true&output=csv';

        const App = () => {
            const [items, setItems] = useState([]);
            const [bags, setBags] = useState([]);
            const [activeBagId, setActiveBagId] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('전체');
            const [isPoolOpen, setIsPoolOpen] = useState(true);
            const [globalBagWeight, setGlobalBagWeight] = useState(2.2);
            const [isCheckMode, setIsCheckMode] = useState(false);
            const [isShareOpen, setIsShareOpen] = useState(false);

            useEffect(() => {
                const savedItems = localStorage.getItem('satpeak_items_v32');
                const savedBags = localStorage.getItem('satpeak_bags_v32');
                const savedGlobalWeight = localStorage.getItem('satpeak_global_weight_v32');
                if (savedGlobalWeight) setGlobalBagWeight(parseFloat(savedGlobalWeight));
                if (savedItems && savedBags) {
                    setItems(JSON.parse(savedItems));
                    setBags(JSON.parse(savedBags));
                } else {
                    const initialBags = ['대장', '종민', '의준', '지호', '서영', '형욱', '상국'].map((name, i) => ({
                        id: `bag-${Date.now()}-${i}`,
                        owner: name, bagWeight: 2.2, personalWeight: 0.0, isExcluded: false
                    }));
                    setBags(initialBags);
                    fetchCSV();
                }
            }, []);

            useEffect(() => {
                if (items.length > 0 || bags.length > 0) {
                    localStorage.setItem('satpeak_items_v32', JSON.stringify(items));
                    localStorage.setItem('satpeak_bags_v32', JSON.stringify(bags));
                    localStorage.setItem('satpeak_global_weight_v32', globalBagWeight.toString());
                }
            }, [items, bags, globalBagWeight]);

            const applyGlobalBagWeight = (newWeight) => {
                const val = parseFloat(newWeight) || 0;
                setGlobalBagWeight(val);
                setBags(bags.map(b => ({ ...b, bagWeight: val })));
            };

            const parseWeight = (w) => {
                if (!w || w.toString().trim() === "") return 0;
                const num = parseFloat(w.toString().replace(/[^0-9.]/g, ''));
                return w.toString().includes('kg') ? num : num / 1000;
            };

            const fetchCSV = () => {
                Papa.parse(CSV_URL, {
                    download: true, header: false, skipEmptyLines: true,
                    complete: (results) => {
                        const rows = results.data;
                        const newItems = [];
                        let lastCat = ''; let lastName = '';
                        rows.forEach((row, idx) => {
                            if (row[2] === '품목' || row[1] === '구분' || !row[2]) return;
                            lastCat = row[1]?.trim() || lastCat;
                            lastName = row[2]?.trim() || lastName;
                            const qty = parseInt(row[3]) || 0;
                            const weight = parseWeight(row[6]);
                            for (let i = 0; i < qty; i++) {
                                newItems.push({ id: `item-${idx}-${i}`, originalName: lastName, name: qty > 1 ? `${lastName} (${i + 1})` : lastName, weight, category: lastCat, owner: '미배정', isChecked: false });
                            }
                        });
                        setItems(newItems);
                    }
                });
            };

            const updateBag = (id, field, val) => setBags(bags.map(b => b.id === id ? { ...b, [field]: val } : b));
            const removeBag = (id) => {
                if (confirm('삭제하시겠습니까?')) {
                    setItems(items.map(i => i.owner === id ? { ...i, owner: '미배정' } : i));
                    setBags(bags.filter(b => b.id !== id));
                }
            };
            const assignOne = (originalName) => {
                if (!activeBagId) return alert('가방을 먼저 선택하세요!');
                setItems(prev => {
                    const idx = prev.findIndex(i => i.originalName === originalName && i.owner === '미배정');
                    if (idx === -1) return prev;
                    const newItems = [...prev];
                    newItems[idx] = { ...newItems[idx], owner: activeBagId };
                    return newItems;
                });
            };
            const handleItemUnassign = (id) => setItems(items.map(i => i.id === id ? { ...i, owner: '미배정' } : i));

            const autoSpread = () => {
                const validBags = bags.filter(b => !b.isExcluded);
                const unassigned = items.filter(i => i.owner === '미배정' && i.name.includes(searchQuery) && (selectedCategory === '전체' || i.category === selectedCategory));
                if (validBags.length === 0 || unassigned.length === 0) return alert('조건을 확인하세요.');
                let updatedItems = [...items];
                const groups = {};
                unassigned.forEach(i => { if (!groups[i.originalName]) groups[i.originalName] = []; groups[i.originalName].push(i); });
                Object.keys(groups).sort((a,b) => groups[b][0].weight - groups[a][0].weight).forEach(name => {
                    const bagWeights = validBags.map(b => {
                        const bItems = updatedItems.filter(i => i.owner === b.id);
                        const w = (parseFloat(b.bagWeight)||0) + (parseFloat(b.personalWeight)||0) + bItems.reduce((s,i)=>s+i.weight,0);
                        return { id: b.id, weight: w };
                    }).sort((a,b)=>a.weight - b.weight);
                    groups[name].forEach((item, idx) => {
                        const targetBagId = bagWeights[idx % bagWeights.length].id;
                        const tIdx = updatedItems.findIndex(ui => ui.id === item.id);
                        updatedItems[tIdx].owner = targetBagId;
                    });
                });
                setItems(updatedItems);
            };

            const spreadSpecificItem = (originalName) => {
                const validBags = bags.filter(b => !b.isExcluded);
                const unassigned = items.filter(i => i.originalName === originalName && i.owner === '미배정');
                if (validBags.length === 0 || unassigned.length === 0) return;
                let updatedItems = [...items];
                const bagWeights = validBags.map(b => {
                    const bItems = updatedItems.filter(i => i.owner === b.id);
                    const w = (parseFloat(b.bagWeight)||0) + (parseFloat(b.personalWeight)||0) + bItems.reduce((s,i)=>s+i.weight,0);
                    return { id: b.id, weight: w };
                }).sort((a,b)=>a.weight - b.weight);
                unassigned.forEach((item, idx) => {
                    updatedItems[updatedItems.findIndex(ui => ui.id === item.id)].owner = bagWeights[idx % bagWeights.length].id;
                });
                setItems(updatedItems);
            };

            const exportToKakao = () => {
                if (bags.length === 0) return alert('공유할 카고백이 없습니다.');
                let text = `🏔️ SAT PEAK 2026 카고백 패킹 현황 🏔️\n\n`;
                bags.forEach(bag => {
                    const bagItems = items.filter(i => i.owner === bag.id);
                    const gearWeight = bagItems.reduce((s, i) => s + (i.weight || 0), 0);
                    const totalWeight = (parseFloat(bag.bagWeight) || 0) + (parseFloat(bag.personalWeight) || 0) + gearWeight;
                    const grouped = {};
                    bagItems.forEach(i => { if (!grouped[i.originalName]) grouped[i.originalName] = 0; grouped[i.originalName]++; });
                    const itemList = Object.entries(grouped).map(([name, count]) => `${name}(${count})`).join(', ');
                    text += `🎒 [${bag.owner || '이름 없음'}] - 총 ${totalWeight.toFixed(2)}kg\n  └ 장비: ${itemList || '비어있음'}\n\n`;
                });
                const unassignedCount = items.filter(i => i.owner === '미배정').length;
                if (unassignedCount > 0) text += `⚠️ 미배정 장비: ${unassignedCount}개 남음\n`;
                navigator.clipboard.writeText(text)
                    .then(() => alert('카톡 공유용 텍스트가 복사되었습니다! 카톡창에 붙여넣기 하세요.'))
                    .catch(err => alert('복사에 실패했습니다.'));
            };

            const exportToImage = () => {
                const target = document.getElementById('export-container');
                if (!target) return alert('캡처 영역을 찾을 수 없습니다.');
                
                htmlToImage.toPng(target, { 
                    backgroundColor: '#f1f5f9', // bg-slate-100 맞춤
                    pixelRatio: 2
                })
                .then((dataUrl) => {
                    const link = document.createElement('a');
                    const dateStr = new Date().toISOString().slice(0,10);
                    link.download = `SAT_PEAK_카고백_현황_${dateStr}.png`;
                    link.href = dataUrl;
                    link.click();
                })
                .catch((err) => {
                    alert('이미지 저장에 실패했습니다.');
                    console.error('캡처 에러:', err);
                });
            };

            const groupedUnassigned = useMemo(() => {
                const filtered = items.filter(i => i.owner === '미배정' && i.name.includes(searchQuery) && (selectedCategory === '전체' || i.category === selectedCategory));
                const groups = {};
                filtered.forEach(i => { if (!groups[i.originalName]) groups[i.originalName] = []; groups[i.originalName].push(i); });
                return groups;
            }, [items, searchQuery, selectedCategory]);

            return (
                <>
                    {/* 📍 전체 여백 조정: 폰 화면 공간을 덜 차지하도록 pb (아래 여백) 조절 */}
                    <div className={`max-w-7xl mx-auto p-3 md:p-4 transition-all duration-500 ${isPoolOpen ? 'pb-[260px]' : 'pb-20'}`}>
                        <header className={`sticky top-0 backdrop-blur-md shadow-sm p-3 md:p-4 rounded-2xl mb-4 z-20 border transition-all duration-300 ${isCheckMode ? 'bg-green-50/95 border-green-300' : 'bg-white/95 border-slate-200'}`}>
                            
                            {/* 📍 1열: 타이틀 & 공유 버튼 */}
                            <div className="flex justify-between items-center mb-3">
                                <h1 className="text-lg md:text-xl font-black italic text-blue-900 tracking-tighter flex items-center gap-1">
                                    🏔️ SAT PEAK <span className="text-slate-400 font-light text-[10px] italic">v32</span>
                                </h1>
                                
                                <div className="relative">
                                    <button 
                                        onClick={() => setIsShareOpen(!isShareOpen)}
                                        className="bg-slate-50 text-slate-600 hover:text-indigo-600 w-8 h-8 flex items-center justify-center rounded-lg shadow-sm hover:bg-indigo-50 active:scale-95 transition-all border border-slate-200"
                                    >
                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path>
                                        </svg>
                                    </button>
                                    
                                    {isShareOpen && (
                                        <div className="absolute right-0 mt-2 w-36 bg-white rounded-xl shadow-xl border border-slate-100 overflow-hidden z-50 animate-fadeIn">
                                            <button onClick={() => { exportToImage(); setIsShareOpen(false); }} className="w-full text-left px-3 py-2.5 text-xs font-bold text-slate-700 hover:bg-indigo-50 border-b border-slate-50">📸 이미지 캡처</button>
                                            <button onClick={() => { exportToKakao(); setIsShareOpen(false); }} className="w-full text-left px-3 py-2.5 text-xs font-bold text-slate-700 hover:bg-green-50">💬 카톡 복사</button>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* 📍 2열: [그룹 1] 표준 가방 무게 */}
                            <div className="flex items-center gap-2 mb-3 bg-slate-50 p-2 rounded-xl border border-slate-100 w-fit">
                                <span className="text-[11px] font-bold text-slate-500">표준 가방 무게:</span>
                                <input type="number" step="0.1" value={globalBagWeight} onChange={(e) => applyGlobalBagWeight(e.target.value)} className="w-14 bg-white border border-slate-200 rounded text-sm font-black text-center py-0.5 outline-none focus:ring-1 focus:ring-blue-500" disabled={isCheckMode} />
                                <span className="text-[11px] font-bold text-slate-400">kg</span>
                            </div>

                            {/* 📍 3열: [그룹 2] 액션 버튼들 (가로 스크롤) */}
                            <div className="flex gap-2 overflow-x-auto no-scrollbar mb-3 pb-1">
                                <button 
                                    onClick={() => setIsCheckMode(!isCheckMode)} 
                                    className={`whitespace-nowrap flex-shrink-0 text-xs font-black px-3 py-2 rounded-lg shadow-sm active:scale-95 transition-all
                                    ${isCheckMode ? 'bg-green-600 text-white ring-2 ring-green-300' : 'bg-white text-green-700 border border-green-300 hover:bg-green-50'}`}>
                                    {isCheckMode ? '✅ 검수 종료' : '☑️ 실물 검수'}
                                </button>

                                {isCheckMode ? (
                                    <button onClick={() => { if(confirm('체크 기록을 초기화하시겠습니까?')) setItems(items.map(i => ({...i, isChecked: false}))) }} className="whitespace-nowrap flex-shrink-0 bg-slate-200 text-slate-700 text-xs font-bold px-3 py-2 rounded-lg shadow-sm hover:bg-slate-300">체크 초기화</button>
                                ) : (
                                    <>
                                        <button onClick={autoSpread} className="whitespace-nowrap flex-shrink-0 bg-amber-400 text-amber-950 text-xs font-black px-3 py-2 rounded-lg shadow-sm hover:bg-amber-500 active:scale-95 transition-all">⚡ 번개배분</button>
                                        <button onClick={() => { const newBag = { id: `bag-${Date.now()}`, owner: '새 카고백', bagWeight: globalBagWeight, personalWeight: 0, isExcluded: false }; setBags([...bags, newBag]); }} className="whitespace-nowrap flex-shrink-0 bg-blue-600 text-white text-xs font-bold px-3 py-2 rounded-lg shadow-sm hover:bg-blue-700">+ 백 추가</button>
                                        <button onClick={() => { if(confirm('데이터를 초기화하시겠습니까?')) { localStorage.clear(); location.reload(); } }} className="whitespace-nowrap flex-shrink-0 text-[10px] font-bold text-red-500 bg-red-50 px-3 py-2 rounded-lg hover:bg-red-100">RESET</button>
                                    </>
                                )}
                            </div>

                            {/* 제외 카고백 */}
                            {!isCheckMode && (
                                <div className="flex items-center gap-2 mb-3 overflow-x-auto no-scrollbar">
                                    <span className="text-[10px] font-bold text-slate-400 flex-shrink-0">제외:</span>
                                    {bags.map(b => (
                                        <button key={b.id} onClick={() => updateBag(b.id, 'isExcluded', !b.isExcluded)} className={`px-2 py-1 rounded text-[10px] font-bold whitespace-nowrap flex-shrink-0 transition-all border ${b.isExcluded ? 'bg-red-500 text-white border-red-600' : 'bg-white text-slate-500 border-slate-200'}`}>{b.owner || '이름 없음'}</button>
                                    ))}
                                </div>
                            )}

                            {/* 📍 4열: 검색 및 카테고리 (여백 축소) */}
                            <div className="flex flex-col gap-2">
                                <input type="text" placeholder={isCheckMode ? "검수 장비 검색..." : "장비 검색..."} className={`w-full p-2 text-sm border rounded-lg outline-none transition-all ${isCheckMode ? 'bg-white border-green-300 focus:ring-1 focus:ring-green-400' : 'bg-slate-50 border-slate-200 focus:ring-1 focus:ring-blue-500'}`} value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                                <div className="flex gap-1.5 overflow-x-auto no-scrollbar">
                                    {['전체', '등반구', '막영구', '취사구', '통신', '연료', '식량'].map(c => <button key={c} onClick={() => setSelectedCategory(c)} className={`px-3 py-1.5 rounded-lg text-[11px] font-bold whitespace-nowrap transition-all ${selectedCategory === c ? (isCheckMode ? 'bg-green-600 text-white' : 'bg-blue-600 text-white') : 'bg-white text-slate-500 border border-slate-200'}`}>{c}</button>)}
                                </div>
                            </div>
                        </header>

                        {/* 📍 카고백 카드 영역: 테두리 두께 및 패딩 축소 */}
                        <div id="export-container" className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 bg-slate-100 rounded-2xl">
                            <div className="hidden print:flex mb-2 px-2 justify-between items-end col-span-full">
                                <h2 className="text-lg font-black text-slate-800">🏔️ SAT PEAK 2026 패킹 현황</h2>
                                <span className="text-[10px] font-bold text-slate-400">{new Date().toLocaleDateString()}</span>
                            </div>
                            
                            {bags.map(bag => {
                                const bagItems = items.filter(i => i.owner === bag.id);
                                const groupedBagItems = {};
                                bagItems.forEach(i => { if (!groupedBagItems[i.originalName]) groupedBagItems[i.originalName] = { ids: [], weight: i.weight }; groupedBagItems[i.originalName].ids.push(i.id); });
                                const gearWeight = bagItems.reduce((s, i) => s + (i.weight || 0), 0);
                                const totalWeight = (parseFloat(bag.bagWeight) || 0) + (parseFloat(bag.personalWeight) || 0) + gearWeight;
                                const active = !isCheckMode && activeBagId === bag.id;
                                
                                const hasMatch = searchQuery && bagItems.some(i => i.originalName.includes(searchQuery));
                                const isDimmed = searchQuery && !hasMatch;

                                const totalBagItems = bagItems.length;
                                const checkedBagItems = bagItems.filter(i => i.isChecked).length;
                                const isBagFullyChecked = totalBagItems > 0 && totalBagItems === checkedBagItems;

                                return (
                                    <div key={bag.id} onClick={() => !isCheckMode && setActiveBagId(bag.id)} 
                                         className={`bg-white p-4 rounded-xl border-2 transition-all duration-200 relative animate-fadeIn
                                         ${!isCheckMode ? 'cursor-pointer' : 'cursor-default'}
                                         ${active ? 'border-blue-500 shadow-md -translate-y-1' : 'border-slate-200 shadow-sm'}
                                         ${hasMatch ? 'ring-4 ring-amber-300/30 border-amber-400 bg-amber-50/30 z-10' : ''}
                                         ${isDimmed ? 'opacity-30 grayscale' : 'opacity-100'}
                                         ${isCheckMode && isBagFullyChecked ? 'border-green-400 bg-green-50/50' : ''}`}>
                                        
                                        {hasMatch && <div className="absolute -top-2.5 left-1/2 -translate-x-1/2 bg-amber-500 text-white text-[9px] font-black px-2 py-0.5 rounded-full shadow-md z-20">MATCH</div>}
                                        {isCheckMode && isBagFullyChecked && <div className="absolute -top-2.5 left-1/2 -translate-x-1/2 bg-green-500 text-white text-[9px] font-black px-2 py-0.5 rounded-full shadow-md z-10 flex items-center gap-1">✓ COMPLETE</div>}

                                        <div className="flex justify-between items-start mb-3">
                                            <div className="flex-1" onClick={e => e.stopPropagation()}>
                                                <div className={`flex items-center gap-1 mb-1 p-1 -m-1 rounded-lg transition-all border border-transparent ${!isCheckMode && 'focus-within:border-blue-400 focus-within:bg-slate-50'}`}>
                                                    <input id={`input-n-${bag.id}`} value={bag.owner} onChange={e => !isCheckMode && updateBag(bag.id, 'owner', e.target.value)} onKeyDown={e => e.key === 'Enter' && e.target.blur()} className={`font-black text-lg bg-transparent border-none w-full text-slate-800 outline-none ${isCheckMode && 'opacity-70 pointer-events-none'}`} placeholder="이름" readOnly={isCheckMode} />
                                                </div>
                                                <div className="flex items-center gap-1.5 mt-1">
                                                    <div className="bg-slate-50 px-1.5 py-0.5 rounded flex items-center border border-slate-200">
                                                        <span className="text-[8px] font-bold text-slate-400 mr-1">가방</span>
                                                        <input type="number" step="0.1" value={bag.bagWeight} onChange={e => updateBag(bag.id, 'bagWeight', e.target.value)} className="w-6 bg-transparent text-[9px] font-black border-none p-0 text-center outline-none" />
                                                    </div>
                                                    <div className="bg-blue-50 px-1.5 py-0.5 rounded flex items-center border border-blue-100">
                                                        <span className="text-[8px] font-bold text-blue-400 mr-1">개인</span>
                                                        <input type="number" step="0.1" value={bag.personalWeight} onChange={e => updateBag(bag.id, 'personalWeight', e.target.value)} className="w-6 bg-transparent text-[9px] font-black border-none p-0 text-center text-blue-700 outline-none" />
                                                    </div>
                                                </div>
                                            </div>
                                            {!isCheckMode && <button onClick={() => removeBag(bag.id)} className="text-slate-300 hover:text-red-500 text-sm">✕</button>}
                                        </div>

                                        <div className="flex justify-between items-end mb-1">
                                            <p className={`text-2xl font-black ${totalWeight > 23 ? 'text-red-500' : 'text-slate-800'}`}>{totalWeight.toFixed(2)}<span className="text-[10px] ml-0.5">kg</span></p>
                                            <p className={`text-[9px] font-black px-1.5 py-0.5 rounded ${totalWeight > 23 ? 'bg-red-50 text-red-500' : 'bg-blue-50 text-blue-500'}`}>{totalWeight > 23 ? `+${(totalWeight-23).toFixed(1)}` : `-${(23-totalWeight).toFixed(1)}`}</p>
                                        </div>

                                        <div className="h-1.5 bg-slate-100 rounded-full mb-3 overflow-hidden">
                                            <div className={`h-full transition-all duration-500 ${totalWeight > 23 ? 'bg-red-500' : 'bg-blue-500'}`} style={{width: `${Math.min((totalWeight/23)*100, 100)}%`}} />
                                        </div>

                                        {isCheckMode && totalBagItems > 0 && (
                                            <div className="mb-3">
                                                <div className="h-1 bg-slate-100 rounded-full overflow-hidden">
                                                    <div className="h-full bg-green-500 transition-all duration-300" style={{width: `${(checkedBagItems/totalBagItems)*100}%`}} />
                                                </div>
                                            </div>
                                        )}

                                        <div className="flex flex-wrap gap-1 min-h-[40px] content-start pt-2 border-t border-slate-100">
                                            {Object.entries(groupedBagItems).map(([name, g]) => {
                                                const isM = searchQuery && name.includes(searchQuery);
                                                const groupItems = items.filter(i => g.ids.includes(i.id));
                                                const checkedCount = groupItems.filter(i => i.isChecked).length;
                                                const total = g.ids.length;
                                                const isAllChecked = checkedCount === total;

                                                let chipClass = '';
                                                let badgeClass = '';

                                                if (isCheckMode) {
                                                    chipClass = isAllChecked ? 'bg-green-500 text-white border-green-600' : (checkedCount > 0 ? 'bg-green-50 text-green-800 border-green-200' : 'bg-slate-50 text-slate-500 border-slate-200');
                                                    badgeClass = isAllChecked ? 'text-white' : 'text-green-600';
                                                } else {
                                                    chipClass = isM ? 'bg-amber-400 border-amber-500 text-amber-950' : 'bg-white text-slate-600 border-slate-200';
                                                    badgeClass = isM ? 'text-white' : 'text-blue-500';
                                                }

                                                return (
                                                    <span key={name} onClick={(e) => { 
                                                            e.stopPropagation(); 
                                                            if (isCheckMode) {
                                                                let targetId = g.ids.find(id => !items.find(i => i.id === id).isChecked);
                                                                if (targetId) setItems(items.map(i => i.id === targetId ? { ...i, isChecked: true } : i));
                                                                else setItems(items.map(i => g.ids.includes(i.id) ? { ...i, isChecked: false } : i));
                                                            } else {
                                                                handleItemUnassign(g.ids[g.ids.length - 1]); 
                                                            }
                                                        }} 
                                                        className={`flex items-center gap-1 text-[9px] px-1.5 py-1 rounded-md font-bold border transition-all cursor-pointer ${chipClass}`}>
                                                        {name}
                                                        <span className={`text-[8px] font-black opacity-80 ${badgeClass}`}>
                                                            {isCheckMode ? (isAllChecked ? '✓' : `${checkedCount}/${total}`) : total}
                                                        </span>
                                                    </span>
                                                );
                                            })}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* 📍 기어 풀 높이 대폭 축소 (h-360px -> h-240px) */}
                    <footer className={`fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md shadow-[0_-10px_30px_rgba(0,0,0,0.05)] border-t transition-all duration-300 z-30 ${isPoolOpen ? 'h-[240px]' : 'h-12'} print:hidden`}>
                        <div className="max-w-7xl mx-auto px-4 h-full flex flex-col">
                            <div className="flex justify-between items-center h-12 cursor-pointer" onClick={() => setIsPoolOpen(!isPoolOpen)}>
                                <div className="flex items-center gap-3">
                                    <span className="text-[11px] font-black text-slate-500 uppercase">Gear Pool</span>
                                    <span className="bg-amber-100 text-amber-700 px-2 py-0.5 rounded text-[9px] font-black">{Object.keys(groupedUnassigned).length}종 / {items.filter(i => i.owner === '미배정').length}개</span>
                                </div>
                                <span className="text-slate-400 text-[10px]">{isPoolOpen ? '▼ 닫기' : '▲ 열기'}</span>
                            </div>
                            
                            {/* 📍 아이템 크기 및 간격 축소 */}
                            <div className={`flex-1 overflow-y-auto pb-4 no-scrollbar ${!isPoolOpen && 'hidden'}`}>
                                <div className="grid grid-cols-3 sm:grid-cols-5 md:grid-cols-8 gap-1.5">
                                    {Object.entries(groupedUnassigned).map(([name, g]) => {
                                        const groupItems = items.filter(i => g.map(gi => gi.id).includes(i.id));
                                        const checkedCount = groupItems.filter(i => i.isChecked).length;
                                        const total = g.length;
                                        const isAllChecked = checkedCount === total;

                                        return (
                                            <div key={name} className={`flex flex-col bg-white border p-1.5 rounded-lg transition-all ${isCheckMode && isAllChecked ? 'border-green-400 bg-green-50' : 'border-slate-200'}`}>
                                                <div className="flex justify-between items-start mb-1">
                                                    <div className="min-w-0 pr-1">
                                                        <p className="text-[9px] font-bold truncate text-slate-700">{name}</p>
                                                        <p className="text-[7px] text-slate-400">{g[0].weight.toFixed(2)}kg</p>
                                                    </div>
                                                    <span className={`px-1 rounded text-[8px] font-black border ${isCheckMode && isAllChecked ? 'bg-green-500 text-white border-green-600' : 'bg-slate-100 text-slate-500'}`}>{g.length}</span>
                                                </div>
                                                <div className="flex gap-1 mt-auto pt-1">
                                                    {!isCheckMode && <button onClick={() => spreadSpecificItem(name)} className="bg-blue-500 text-white px-1.5 py-0.5 rounded text-[8px] font-black">⚡</button>}
                                                    <button onClick={() => {
                                                        if (isCheckMode) {
                                                            let targetId = g.find(i => !i.isChecked)?.id;
                                                            if (targetId) setItems(items.map(i => i.id === targetId ? { ...i, isChecked: true } : i));
                                                            else setItems(items.map(i => g.map(gi=>gi.id).includes(i.id) ? { ...i, isChecked: false } : i));
                                                        } else assignOne(name);
                                                    }} className={`flex-1 py-0.5 rounded text-[8px] font-black ${isCheckMode ? (isAllChecked ? 'bg-green-500 text-white' : 'bg-green-100 text-green-700') : 'bg-amber-400 text-white'}`}>
                                                        {isCheckMode ? (isAllChecked ? '완료' : `✓ ${checkedCount}`) : '담기'}
                                                    </button>
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                        </div>
                    </footer>
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
