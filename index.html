<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삿피크 원정대 수화물 배분</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 은설님의 구글 시트 CSV 내보내기 주소
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/1uDshkv41LSU6sgCPCObH0KxefUk0VDc9/export?format=csv';

        const App = () => {
            const [items, setItems] = useState([]);
            const [activeMember, setActiveMember] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('전체');
            const [isExceeded, setIsExceeded] = useState(null);

            useEffect(() => {
                const saved = localStorage.getItem('himalayan_luggage');
                if (saved) { setItems(JSON.parse(saved)); } 
                else { fetchCSV(); }
            }, []);

            useEffect(() => {
                if (items.length > 0) localStorage.setItem('himalayan_luggage', JSON.stringify(items));
            }, [items]);

            const fetchCSV = () => {
                Papa.parse(CSV_URL, {
                    download: true,
                    header: true,
                    complete: (results) => {
                        const data = results.data
                            .filter(row => row['품목명'])
                            .map((row, idx) => ({
                                id: `item-${idx}`,
                                name: row['품목명'],
                                weight: parseFloat(row['무게(kg)'] || 0),
                                volume: parseInt(row['부피(1-10)'] || 0),
                                category: row['분류'] || '기타',
                                owner: row['배정자'] || '미배정'
                            }));
                        setItems(data);
                    }
                });
            };

            const handleItemClick = (id) => {
                setItems(prev => prev.map(item => {
                    if (item.id !== id) return item;
                    if (item.owner !== '미배정') return { ...item, owner: '미배정' };
                    if (!activeMember) { alert('배낭 카드를 먼저 선택하세요!'); return item; }
                    
                    const memberItems = prev.filter(i => i.owner === activeMember);
                    const w = memberItems.reduce((s, i) => s + i.weight, 0) + item.weight;
                    const v = memberItems.reduce((s, i) => s + i.volume, 0) + item.volume;
                    if (w > 23 || v > 100) { setIsExceeded(activeMember); setTimeout(() => setIsExceeded(null), 500); }
                    
                    return { ...item, owner: activeMember };
                }));
            };

            const members = useMemo(() => [...new Set(items.map(i => i.owner))].filter(n => n !== '미배정'), [items]);
            const categories = useMemo(() => ['전체', ...new Set(items.map(i => i.category))], [items]);
            const filtered = items.filter(i => i.name.includes(searchQuery) && (selectedCategory === '전체' || i.category === selectedCategory));

            return (
                <div className="max-w-4xl mx-auto min-h-screen pb-48">
                    <header className="sticky top-0 bg-white shadow-sm p-4 z-20">
                        <div className="flex justify-between items-center mb-3">
                            <h1 className="text-xl font-bold">🏔️ 삿피크 수화물 배분</h1>
                            <button onClick={() => { if(confirm('리셋하시겠습니까?')) { localStorage.removeItem('himalayan_luggage'); fetchCSV(); } }} className="text-xs bg-red-50 text-red-600 px-2 py-1 rounded">초기화</button>
                        </div>
                        <input type="text" placeholder="장비 검색..." className="w-full p-2 border rounded mb-3" onChange={e => setSearchQuery(e.target.value)} />
                        <div className="flex gap-2 overflow-x-auto no-scrollbar">
                            {categories.map(c => <button key={c} onClick={() => setSelectedCategory(c)} className={`px-3 py-1 rounded-full text-xs whitespace-nowrap ${selectedCategory === c ? 'bg-blue-600 text-white' : 'bg-gray-100'}`}>{c}</button>)}
                        </div>
                    </header>

                    <div className="p-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                        {members.map(m => {
                            const mItems = items.filter(i => i.owner === m);
                            const tw = mItems.reduce((s, i) => s + i.weight, 0);
                            const tv = mItems.reduce((s, i) => s + i.volume, 0);
                            return (
                                <div key={m} onClick={() => setActiveMember(m)} className={`bg-white p-4 rounded-xl border-2 transition-all ${activeMember === m ? 'border-blue-500 shadow-lg' : 'border-transparent'} ${isExceeded === m ? 'bg-red-50 animate-pulse' : ''}`}>
                                    <div className="flex justify-between font-bold mb-2"><span>{m}</span><span className="text-xs font-normal text-gray-400">{mItems.length}개</span></div>
                                    <div className="space-y-2 mb-3">
                                        <div className="h-1.5 bg-gray-100 rounded-full overflow-hidden"><div className={`h-full ${tw > 23 ? 'bg-red-500' : 'bg-blue-500'}`} style={{width: `${(tw/23)*100}%`}} /></div>
                                        <div className="h-1.5 bg-gray-100 rounded-full overflow-hidden"><div className={`h-full ${tv > 100 ? 'bg-red-500' : 'bg-orange-400'}`} style={{width: `${(tv/100)*100}%`}} /></div>
                                    </div>
                                    <div className="flex flex-wrap gap-1">
                                        {mItems.map(i => <span key={i.id} onClick={e => { e.stopPropagation(); handleItemClick(i.id); }} className={`text-[10px] px-2 py-0.5 rounded cursor-pointer ${filtered.find(f => f.id === i.id) ? 'bg-blue-100 text-blue-700' : 'bg-gray-50 text-gray-300'}`}>{i.name}</span>)}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    <footer className="fixed bottom-0 left-0 right-0 bg-white border-t p-4 h-40 overflow-y-auto z-30">
                        <p className="text-[10px] text-gray-400 mb-2 uppercase">미배정 풀</p>
                        <div className="flex flex-wrap gap-2">
                            {items.filter(i => i.owner === '미배정').map(i => (
                                <button key={i.id} onClick={() => handleItemClick(i.id)} className={`px-2 py-1 rounded-full text-[11px] border ${filtered.find(f => f.id === i.id) ? 'bg-orange-500 text-white border-orange-500' : 'bg-white text-gray-300 border-gray-100 opacity-40'}`}>
                                    {i.name} {i.weight}kg
                                </button>
                            ))}
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
