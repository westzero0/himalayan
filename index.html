<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAT PEAK 2026 공동장비 배분</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 📍 1. 시트 주소 (공동장비의 사본 gid 적용됨)
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRMz1Mst7D5jGzoM6osU0pdF0c0jn0TC6WLf_k7dTpsca6lQV2e5mT_BCieoXAapA/pub?gid=1147527820&single=true&output=csv';

        const App = () => {
            const [items, setItems] = useState([]);
            const [activeMember, setActiveMember] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('전체');
            const [excludedMembers, setExcludedMembers] = useState(['대장']); // 번개배분 제외 대원

            const memberList = ['대장', '종민', '의준', '지호', '서영', '형욱', '상국'];
            const categories = ['전체', '등반구', '막영구', '취사구', '통신', '연료', '식량'];

            useEffect(() => {
                const saved = localStorage.getItem('satpeak_final_v1');
                if (saved) { setItems(JSON.parse(saved)); } 
                else { fetchCSV(); }
            }, []);

            useEffect(() => {
                if (items.length > 0) localStorage.setItem('satpeak_final_v1', JSON.stringify(items));
            }, [items]);

            const parseWeight = (w) => {
                if (!w || w.toString().trim() === "") return 0;
                const num = parseFloat(w.toString().replace(/[^0-9.]/g, ''));
                if (isNaN(num)) return 0;
                return w.toString().includes('kg') ? num : num / 1000;
            };

            const fetchCSV = () => {
                Papa.parse(CSV_URL, {
                    download: true,
                    header: false,
                    skipEmptyLines: true,
                    complete: (results) => {
                        console.log("시트 원본 로드됨:", results.data.length, "행");
                        const rows = results.data;
                        const newItems = [];
                        let lastCategory = '';
                        let lastItemName = '';

                        rows.forEach((row, idx) => {
                            if (row[2] === '품목' || row[1] === '구분' || !row[2]) return;

                            let currentCat = row[1]?.trim();
                            let currentName = row[2]?.trim();
                            
                            if (currentCat) lastCategory = currentCat;
                            if (currentName) lastItemName = currentName;

                            const name = lastItemName;
                            const category = lastCategory || '미분류';
                            const qty = parseInt(row[3]) || 0;
                            const weight = parseWeight(row[6]); // G열

                            if (name && qty > 0) {
                                for (let i = 0; i < qty; i++) {
                                    newItems.push({
                                        id: `item-${idx}-${i}`,
                                        originalName: name,
                                        name: qty > 1 ? `${name} (${i + 1})` : name,
                                        weight: weight || 0,
                                        category: category,
                                        owner: '미배정'
                                    });
                                }
                            }
                        });
                        setItems(newItems);
                    }
                });
            };

            // ⚡ 번개 배분 기능
            const autoSpread = () => {
                const targetMembers = memberList.filter(m => !excludedMembers.includes(m));
                if (targetMembers.length === 0) return alert('배분할 대원이 없습니다!');

                const currentUnassigned = items.filter(i => 
                    i.owner === '미배정' && 
                    i.name.includes(searchQuery) && 
                    (selectedCategory === '전체' || i.category === selectedCategory)
                );

                if (currentUnassigned.length === 0) return alert('배분할 장비가 없습니다.');

                let updatedItems = [...items];
                currentUnassigned.forEach((item, idx) => {
                    const member = targetMembers[idx % targetMembers.length];
                    const targetIdx = updatedItems.findIndex(ui => ui.id === item.id);
                    updatedItems[targetIdx].owner = member;
                });
                setItems(updatedItems);
            };

            const handleItemClick = (id) => {
                setItems(prev => prev.map(item => {
                    if (item.id !== id) return item;
                    if (item.owner !== '미배정') return { ...item, owner: '미배정' };
                    if (!activeMember) { alert('대원 카드를 먼저 클릭하세요!'); return item; }
                    return { ...item, owner: activeMember };
                }));
            };

            // 필터링된 리스트 (검색어 + 카테고리)
            const filteredItems = useMemo(() => {
                return items.filter(i => 
                    i.name.includes(searchQuery) && 
                    (selectedCategory === '전체' || i.category === selectedCategory)
                );
            }, [items, searchQuery, selectedCategory]);

            return (
                <div className="max-w-6xl mx-auto p-4 pb-72">
                    <header className="sticky top-0 bg-white/95 backdrop-blur-md shadow-lg p-5 rounded-3xl mb-6 z-20 border border-slate-200">
                        <div className="flex justify-between items-center mb-4">
                            <h1 className="text-xl font-black italic text-blue-900">🏔️ SAT PEAK 2026</h1>
                            <div className="flex gap-2">
                                <button onClick={autoSpread} className="bg-blue-600 text-white text-xs font-bold px-4 py-2 rounded-xl shadow-lg active:scale-95 transition-all">⚡ 번개 배분</button>
                                <button onClick={() => { if(confirm('초기화?')) { localStorage.removeItem('satpeak_final_v1'); fetchCSV(); } }} className="text-[10px] font-bold text-red-500 border border-red-100 px-2 py-1 rounded-md bg-red-50">RESET</button>
                            </div>
                        </div>

                        <div className="flex items-center gap-3 mb-4 p-3 bg-slate-50 rounded-2xl border border-slate-100 overflow-x-auto no-scrollbar">
                            <span className="text-[10px] font-bold text-slate-400 uppercase whitespace-nowrap">제외:</span>
                            {memberList.map(m => (
                                <button key={m} onClick={() => setExcludedMembers(prev => prev.includes(m) ? prev.filter(em => em !== m) : [...prev, m])}
                                    className={`px-2 py-1 rounded-md text-[10px] font-bold whitespace-nowrap transition-all ${excludedMembers.includes(m) ? 'bg-red-500 text-white shadow-sm' : 'bg-white text-slate-400 border'}`}>
                                    {m}
                                </button>
                            ))}
                        </div>

                        <input type="text" placeholder="장비 검색..." className="w-full p-3 bg-slate-50 border rounded-xl mb-4 focus:ring-2 focus:ring-blue-500 outline-none" onChange={e => setSearchQuery(e.target.value)} />
                        
                        <div className="flex gap-2 overflow-x-auto no-scrollbar">
                            {categories.map(c => <button key={c} onClick={() => setSelectedCategory(c)} className={`px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-all ${selectedCategory === c ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-100 text-slate-500'}`}>{c}</button>)}
                        </div>
                    </header>

                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        {memberList.map(m => {
                            const mItems = items.filter(i => i.owner === m);
                            const tw = mItems.reduce((s, i) => s + (i.weight || 0), 0);
                            const active = activeMember === m;
                            return (
                                <div key={m} onClick={() => setActiveMember(m)} className={`bg-white p-5 rounded-2xl border-4 transition-all cursor-pointer relative ${active ? 'border-blue-500 shadow-xl -translate-y-1' : 'border-transparent shadow-sm'}`}>
                                    {active && <div className="absolute -top-3 left-1/2 -translate-x-1/2 bg-blue-500 text-white text-[10px] px-2 py-0.5 rounded-full font-bold">ACTIVE</div>}
                                    <div className="flex justify-between items-end mb-4">
                                        <span className={`text-lg font-black ${excludedMembers.includes(m) ? 'text-slate-300' : ''}`}>{m}</span>
                                        <span className={`text-sm font-black ${tw > 23 ? 'text-red-500' : 'text-blue-600'}`}>{(tw || 0).toFixed(2)}kg</span>
                                    </div>
                                    <div className="h-1.5 bg-slate-100 rounded-full mb-4 overflow-hidden">
                                        <div className={`h-full transition-all duration-500 ${tw > 23 ? 'bg-red-500' : 'bg-blue-500'}`} style={{width: `${Math.min((tw/23)*100, 100)}%`}} />
                                    </div>
                                    <div className="flex flex-wrap gap-1">
                                        {mItems.map(i => {
                                            const isMatch = searchQuery && i.name.includes(searchQuery);
                                            return (
                                                <span key={i.id} onClick={e => { e.stopPropagation(); handleItemClick(i.id); }} 
                                                    className={`text-[9px] px-1.5 py-0.5 rounded font-bold border transition-all ${isMatch ? 'bg-yellow-300 text-black border-yellow-400 scale-110 z-10' : 'bg-blue-50 text-blue-700 border-blue-100'}`}>
                                                    {i.name}
                                                </span>
                                            );
                                        })}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    <footer className="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t p-6 h-64 overflow-y-auto z-30 shadow-[0_-10px_40px_rgba(0,0,0,0.1)]">
                        <div className="max-w-6xl mx-auto">
                            <p className="text-[10px] font-black text-slate-400 mb-3 tracking-widest uppercase">{selectedCategory} GEAR POOL ({filteredItems.filter(i => i.owner === '미배정').length})</p>
                            <div className="flex flex-wrap gap-2">
                                {filteredItems.filter(i => i.owner === '미배정').map(i => (
                                    <button key={i.id} onClick={() => handleItemClick(i.id)} className="px-3 py-1.5 rounded-xl text-[11px] font-bold border transition-all bg-amber-400 text-white border-amber-400 shadow-sm hover:scale-105">
                                        {i.name} <span className="opacity-70 font-medium ml-1">{(i.weight || 0).toFixed(2)}kg</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
