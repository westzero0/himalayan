<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAT PEAK 2026 물류 관리 v15</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRMz1Mst7D5jGzoM6osU0pdF0c0jn0TC6WLf_k7dTpsca6lQV2e5mT_BCieoXAapA/pub?gid=1147527820&single=true&output=csv';

        const App = () => {
            const [items, setItems] = useState([]);
            const [bags, setBags] = useState([]);
            const [activeBagId, setActiveBagId] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('전체');
            const [isPoolOpen, setIsPoolOpen] = useState(true);
            const [globalBagWeight, setGlobalBagWeight] = useState(2.2);

            const categories = ['전체', '등반구', '막영구', '취사구', '통신', '연료', '식량'];

            useEffect(() => {
                const savedItems = localStorage.getItem('satpeak_items_v15');
                const savedBags = localStorage.getItem('satpeak_bags_v15');
                const savedGlobalWeight = localStorage.getItem('satpeak_global_weight_v15');
                
                if (savedGlobalWeight) setGlobalBagWeight(parseFloat(savedGlobalWeight));

                if (savedItems && savedBags) {
                    setItems(JSON.parse(savedItems));
                    setBags(JSON.parse(savedBags));
                } else {
                    const initialBags = ['대장', '종민', '의준', '지호', '서영', '형욱', '상국'].map((name, i) => ({
                        id: `bag-${Date.now()}-${i}`,
                        owner: name,
                        bagWeight: 2.2,
                        personalWeight: 0.0
                    }));
                    setBags(initialBags);
                    fetchCSV();
                }
            }, []);

            useEffect(() => {
                if (items.length > 0 || bags.length > 0) {
                    localStorage.setItem('satpeak_items_v15', JSON.stringify(items));
                    localStorage.setItem('satpeak_bags_v15', JSON.stringify(bags));
                    localStorage.setItem('satpeak_global_weight_v15', globalBagWeight.toString());
                }
            }, [items, bags, globalBagWeight]);

            const applyGlobalBagWeight = (newWeight) => {
                const val = parseFloat(newWeight) || 0;
                setGlobalBagWeight(val);
                setBags(bags.map(b => ({ ...b, bagWeight: val })));
            };

            const parseWeight = (w) => {
                if (!w || w.toString().trim() === "") return 0;
                const num = parseFloat(w.toString().replace(/[^0-9.]/g, ''));
                if (isNaN(num)) return 0;
                return w.toString().includes('kg') ? num : num / 1000;
            };

            const fetchCSV = () => {
                Papa.parse(CSV_URL, {
                    download: true, header: false, skipEmptyLines: true,
                    complete: (results) => {
                        const rows = results.data;
                        const newItems = [];
                        let lastCategory = ''; let lastItemName = '';
                        rows.forEach((row, idx) => {
                            if (row[2] === '품목' || row[1] === '구분' || !row[2]) return;
                            let currentCat = row[1]?.trim() || lastCategory;
                            let currentName = row[2]?.trim() || lastItemName;
                            lastCategory = currentCat; lastItemName = currentName;
                            const qty = parseInt(row[3]) || 0;
                            const weight = parseWeight(row[6]);
                            for (let i = 0; i < qty; i++) {
                                newItems.push({ id: `item-${idx}-${i}`, originalName: currentName, name: qty > 1 ? `${currentName} (${i + 1})` : currentName, weight: weight, category: currentCat, owner: '미배정' });
                            }
                        });
                        setItems(newItems);
                    }
                });
            };

            const addBag = () => {
                const newBag = { id: `bag-${Date.now()}`, owner: '새 카고백', bagWeight: globalBagWeight, personalWeight: 0 };
                setBags([...bags, newBag]);
            };

            const removeBag = (id) => {
                if (confirm('이 카고백을 삭제하시겠습니까?')) {
                    setItems(items.map(i => i.owner === id ? { ...i, owner: '미배정' } : i));
                    setBags(bags.filter(b => b.id !== id));
                    if (activeBagId === id) setActiveBagId(null);
                }
            };

            const updateBag = (id, field, val) => {
                setBags(bags.map(b => b.id === id ? { ...b, [field]: val } : b));
            };

            const assignOne = (originalName) => {
                if (!activeBagId) return alert('배분할 카고백을 먼저 선택하세요!');
                setItems(prev => {
                    const targetIdx = prev.findIndex(i => i.originalName === originalName && i.owner === '미배정');
                    if (targetIdx === -1) return prev;
                    const newItems = [...prev];
                    newItems[targetIdx] = { ...newItems[targetIdx], owner: activeBagId };
                    return newItems;
                });
            };

            const handleItemUnassign = (itemId) => {
                setItems(items.map(i => i.id === itemId ? { ...i, owner: '미배정' } : i));
            };

            const groupedUnassigned = useMemo(() => {
                const filtered = items.filter(i => i.owner === '미배정' && i.name.includes(searchQuery) && (selectedCategory === '전체' || i.category === selectedCategory));
                const groups = {};
                filtered.forEach(item => {
                    if (!groups[item.originalName]) groups[item.originalName] = [];
                    groups[item.originalName].push(item);
                });
                return groups;
            }, [items, searchQuery, selectedCategory]);

            return (
                <> {/* 📍 문법 오류 해결을 위한 Fragment 추가 */}
                    <div className={`max-w-7xl mx-auto p-4 transition-all duration-500 ${isPoolOpen ? 'pb-[400px]' : 'pb-24'}`}>
                        <header className="sticky top-0 bg-white/95 backdrop-blur-md shadow-sm p-6 rounded-[2rem] mb-8 z-20 border border-slate-100">
                            <div className="flex flex-wrap justify-between items-center gap-4 mb-6">
                                <h1 className="text-2xl font-black italic text-blue-900 tracking-tighter">🏔️ SAT PEAK LOGISTICS <span className="text-slate-300 font-light text-sm italic">v15</span></h1>
                                <div className="flex items-center gap-3 bg-slate-50 p-2 rounded-2xl border border-slate-100">
                                    <span className="text-[11px] font-bold text-slate-500 ml-2">표준 가방:</span>
                                    <input type="number" step="0.1" value={globalBagWeight} onChange={(e) => applyGlobalBagWeight(e.target.value)} className="w-16 bg-white border border-slate-200 rounded-lg text-sm font-black text-center p-1 focus:ring-2 focus:ring-blue-500 outline-none" />
                                    <span className="text-[11px] font-bold text-slate-400 mr-2">kg</span>
                                </div>
                                <div className="flex gap-2 ml-auto">
                                    <button onClick={addBag} className="bg-blue-600 text-white text-xs font-bold px-4 py-2 rounded-xl shadow-lg hover:bg-blue-700 active:scale-95 transition-all">+ 백 추가</button>
                                    <button onClick={() => { if(confirm('RESET?')) { localStorage.clear(); location.reload(); } }} className="text-[10px] font-bold text-red-400 border border-red-100 px-3 py-1 rounded-lg">RESET ALL</button>
                                </div>
                            </div>

                            <div className="flex flex-col md:flex-row gap-4">
                                <input type="text" placeholder="장비 검색..." className="flex-1 p-3 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none shadow-inner" onChange={e => setSearchQuery(e.target.value)} />
                                <div className="flex gap-2 overflow-x-auto no-scrollbar py-1">
                                    {categories.map(c => <button key={c} onClick={() => setSelectedCategory(c)} className={`px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap transition-all ${selectedCategory === c ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-slate-400 border border-slate-100 hover:bg-slate-50'}`}>{c}</button>)}
                                </div>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                            {bags.map(bag => {
                                const bagItems = items.filter(i => i.owner === bag.id);
                                const groupedBagItems = {};
                                bagItems.forEach(item => {
                                    if (!groupedBagItems[item.originalName]) groupedBagItems[item.originalName] = { ids: [], weight: item.weight };
                                    groupedBagItems[item.originalName].ids.push(item.id);
                                });

                                const gearWeight = bagItems.reduce((s, i) => s + (i.weight || 0), 0);
                                const totalWeight = (parseFloat(bag.bagWeight) || 0) + (parseFloat(bag.personalWeight) || 0) + gearWeight;
                                const active = activeBagId === bag.id;
                                const remaining = 23 - totalWeight;

                                return (
                                    <div key={bag.id} onClick={() => setActiveBagId(bag.id)} 
                                         className={`bg-white p-6 rounded-[2.5rem] border-4 transition-all duration-300 cursor-pointer relative animate-fadeIn ${active ? 'border-blue-600 shadow-[0_0_25px_rgba(37,99,235,0.2)] -translate-y-2 bg-blue-50/10' : 'border-transparent shadow-sm hover:border-slate-200 hover:shadow-md'}`}>
                                        
                                        {active && <div className="absolute -top-3 left-1/2 -translate-x-1/2 bg-blue-600 text-white text-[10px] font-black px-3 py-1 rounded-full shadow-lg z-10">SELECTED</div>}

                                        <div className="flex justify-between items-start mb-4">
                                            <div className="flex-1 group">
                                                <div className="flex items-center gap-2 mb-1 relative">
                                                    <input id={`input-name-${bag.id}`} value={bag.owner} onChange={e => updateBag(bag.id, 'owner', e.target.value)} onKeyDown={e => e.key === 'Enter' && e.target.blur()} onClick={e => e.stopPropagation()} className={`font-black text-xl bg-transparent border-b-2 border-transparent focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-100 rounded-lg px-1 w-full text-slate-800 transition-all outline-none ${active ? 'text-blue-900' : ''}`} placeholder="이름 입력" />
                                                    <button onClick={(e) => { e.stopPropagation(); document.getElementById(`input-name-${bag.id}`).focus(); }} className="flex-shrink-0 w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 transition-all"><span className="text-slate-300 group-hover:text-blue-500 text-sm">✎</span></button>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <div className="bg-slate-50 px-2 py-1 rounded-xl border border-slate-200 flex items-center focus-within:ring-4 focus-within:ring-blue-100 focus-within:border-blue-500 focus-within:bg-white transition-all">
                                                        <span className="text-[9px] font-black text-slate-400 mr-1">BAG</span>
                                                        <input type="number" step="0.1" value={bag.bagWeight} onChange={e => updateBag(bag.id, 'bagWeight', e.target.value)} onKeyDown={e => e.key === 'Enter' && e.target.blur()} onClick={e => e.stopPropagation()} className="w-8 bg-transparent text-[10px] font-black border-none p-0 focus:ring-0 text-center" />
                                                    </div>
                                                    <div className="bg-blue-50 px-2 py-1 rounded-xl border border-blue-200 flex items-center focus-within:ring-4 focus-within:ring-blue-100 focus-within:border-blue-500 focus-within:bg-white transition-all">
                                                        <span className="text-[9px] font-black text-blue-500 mr-1">PERS</span>
                                                        <input type="number" step="0.1" value={bag.personalWeight} onChange={e => updateBag(bag.id, 'personalWeight', e.target.value)} onKeyDown={e => e.key === 'Enter' && e.target.blur()} onClick={e => e.stopPropagation()} className="w-8 bg-transparent text-[10px] font-black border-none p-0 focus:ring-0 text-center text-blue-800" />
                                                    </div>
                                                </div>
                                            </div>
                                            <button onClick={(e) => { e.stopPropagation(); removeBag(bag.id); }} className="text-slate-200 hover:text-red-500 p-1">✕</button>
                                        </div>

                                        <div className="flex justify-between items-end mb-2 px-1">
                                            <p className={`text-3xl font-black tracking-tighter ${totalWeight > 23 ? 'text-red-500' : 'text-slate-800'}`}>{totalWeight.toFixed(2)}<span className="text-sm ml-1 font-bold">kg</span></p>
                                            <p className={`text-[10px] font-black px-2 py-1 rounded-lg ${remaining < 0 ? 'bg-red-50 text-red-500' : 'bg-blue-50 text-blue-500'}`}>{remaining < 0 ? `초과 ${Math.abs(remaining).toFixed(2)}` : `여유 ${remaining.toFixed(2)}`}</p>
                                        </div>

                                        <div className="h-2.5 bg-slate-100 rounded-full mb-4 overflow-hidden border border-slate-50 shadow-inner">
                                            <div className={`h-full transition-all duration-700 ${totalWeight > 23 ? 'bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.3)]' : 'bg-blue-600'}`} style={{width: `${Math.min((totalWeight/23)*100, 100)}%`}} />
                                        </div>

                                        <div className="flex flex-wrap gap-1.5 min-h-[60px] content-start pt-3 border-t border-slate-50">
                                            {Object.entries(groupedBagItems).map(([name, group]) => (
                                                <span key={name} onClick={(e) => { e.stopPropagation(); handleItemUnassign(group.ids[group.ids.length - 1]); }} className="flex items-center gap-1.5 text-[10px] px-2.5 py-1.5 rounded-xl font-bold bg-white border border-slate-100 text-slate-600 hover:bg-red-50 hover:text-red-600 hover:border-red-100 transition-all active:scale-95 shadow-sm group/item">
                                                    {name}
                                                    <span className="bg-blue-600 text-white px-1.5 py-0.5 rounded-lg text-[9px] font-black group-hover/item:bg-red-500">{group.ids.length}</span>
                                                </span>
                                            ))}
                                            {bagItems.length === 0 && <span className="text-[10px] text-slate-300 italic w-full text-center mt-3">비어있음</span>}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <footer className={`fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl shadow-[0_-20px_50px_rgba(0,0,0,0.1)] border-t border-slate-200 transition-all duration-500 z-30 ${isPoolOpen ? 'h-[360px]' : 'h-16'}`}>
                        <div className="max-w-7xl mx-auto px-6 h-full flex flex-col">
                            <div className="flex justify-between items-center h-16 flex-shrink-0 cursor-pointer group" onClick={() => setIsPoolOpen(!isPoolOpen)}>
                                <div className="flex items-center gap-4">
                                    <span className="text-xs font-black tracking-widest text-slate-400 uppercase italic">Unassigned Gear Pool</span>
                                    <span className="bg-amber-100 text-amber-600 px-3 py-1 rounded-full text-[10px] font-black shadow-sm">{Object.keys(groupedUnassigned).length}종 / {items.filter(i => i.owner === '미배정').length}개 남음</span>
                                </div>
                                <button className="bg-slate-50 px-4 py-2 rounded-xl text-slate-500 group-hover:bg-slate-100 transition-all font-bold text-xs border border-slate-100">{isPoolOpen ? '▼ POOL 숨기기' : '▲ POOL 펼치기'}</button>
                            </div>
                            
                            <div className={`flex-1 overflow-y-auto pb-10 no-scrollbar ${!isPoolOpen && 'hidden'}`}>
                                <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 xl:grid-cols-10 gap-2">
                                    {Object.entries(groupedUnassigned).map(([name, group]) => (
                                        <div key={name} className="flex flex-col bg-white border border-slate-100 p-2 rounded-xl shadow-sm hover:border-blue-200 transition-all group/card">
                                            <div className="flex justify-between items-start mb-1.5">
                                                <div className="min-w-0 pr-1">
                                                    <p className="text-[10px] font-bold truncate text-slate-700 leading-tight" title={name}>{name}</p>
                                                    <p className="text-[8px] font-medium text-slate-400 tracking-tighter">{group[0].weight.toFixed(2)}kg</p>
                                                </div>
                                                <span className="bg-slate-50 text-slate-600 text-[9px] px-1 py-0.5 rounded-md font-black border border-slate-100 flex-shrink-0">{group.length}</span>
                                            </div>
                                            <button onClick={() => assignOne(name)} className="w-full bg-amber-400 text-white py-1 rounded-lg text-[9px] font-black shadow-sm hover:bg-amber-500 active:scale-95 transition-all">담기</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </footer>
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
